<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication | Keinen Techne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-deep: #FFFFFF;
      --bg-soft: #F5F5F5;
      --primary-text: #212121;
      --secondary-text: #9E9E9E;
      --accent-1: #E53935;
      --accent-2: #C62828;
      --border: rgba(0, 0, 0, 0.08);
      --gradient: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--bg-soft); 
      color: var(--primary-text); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh;
      overflow: hidden;
    }

    /* DIGITAL GRID BACKGROUND */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 50px 50px;
      opacity: 0.5;
      z-index: -1;
    }

    .auth-container {
      background: white;
      padding: 60px;
      border-radius: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.1);
      border: 1px solid var(--border);
      position: relative;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 40px;
      text-align: center;
    }

    .logo span { color: var(--accent-1); }

    .tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 10px 0;
      font-weight: 700;
      color: var(--secondary-text);
      cursor: pointer;
      position: relative;
      transition: 0.3s;
    }

    .tab.active {
      color: var(--accent-1);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--accent-1);
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--secondary-text);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group input {
      width: 100%;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-soft);
      font-family: inherit;
      transition: 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent-1);
      background: white;
    }

    .btn-auth {
      width: 100%;
      padding: 18px;
      background: var(--accent-1);
      color: white;
      border: none;
      border-radius: 100px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 20px;
    }

    .btn-auth:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(229, 57, 53, 0.2);
    }

    .message {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
    }

    .message.error { color: var(--accent-1); }
    .message.success { color: #4CAF50; }

    .back-home {
      display: block;
      text-align: center;
      margin-top: 30px;
      color: var(--secondary-text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }

    .back-home:hover { color: var(--accent-1); }
  </style>
</head>

<body>

  <div class="auth-container">
    <div class="logo">KEI<span>N</span>EN</div>
    
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Login</div>
      <div class="tab" onclick="switchTab('register')">Register</div>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form" class="auth-form active">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="name@company.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn-auth" onclick="handleLogin()">Login to Dashboard</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-form" class="auth-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="John Doe">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="name@company.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="••••••••">
      </div>
      <button class="btn-auth" onclick="handleRegister()">Create Account</button>
    </div>

    <div id="auth-message" class="message"></div>

    <a href="index.html" class="back-home">← Back to Homepage</a>
  </div>

  <script>
    function switchTab(type) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      
      if(type === 'login') {
        document.querySelector('.tab:nth-child(1)').classList.add('active');
        document.getElementById('login-form').classList.add('active');
      } else {
        document.querySelector('.tab:nth-child(2)').classList.add('active');
        document.getElementById('register-form').classList.add('active');
      }
      document.getElementById('auth-message').innerText = '';
    }

    function handleRegister() {
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const msg = document.getElementById('auth-message');

      if(!name || !email || !password) {
        msg.innerText = "Please fill in all fields.";
        msg.className = "message error";
        return;
      }

      const users = JSON.parse(localStorage.getItem('keinen_users') || '[]');
      if(users.find(u => u.email === email)) {
        msg.innerText = "Email already registered.";
        msg.className = "message error";
        return;
      }

      users.push({ name, email, password });
      localStorage.setItem('keinen_users', JSON.stringify(users));
      
      msg.innerText = "Registration successful! Please login.";
      msg.className = "message success";
      setTimeout(() => switchTab('login'), 1500);
    }

    function handleLogin() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const msg = document.getElementById('auth-message');

      const users = JSON.parse(localStorage.getItem('keinen_users') || '[]');
      const user = users.find(u => u.email === email && u.password === password);

      if(user) {
        localStorage.setItem('keinen_logged_in', JSON.stringify({ name: user.name, email: user.email }));
        msg.innerText = "Login successful! Redirecting...";
        msg.className = "message success";
        
        // Redirect to wherever they were trying to go or home
        const redirect = sessionStorage.getItem('auth_redirect') || 'index.html';
        sessionStorage.removeItem('auth_redirect');
        setTimeout(() => window.location.href = redirect, 1000);
      } else {
        msg.innerText = "Invalid email or password.";
        msg.className = "message error";
      }
    }
  </script>
</body>
</html>
