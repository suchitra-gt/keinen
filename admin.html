<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Keinen Techne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-deep: #FFFFFF;
      --bg-soft: #F5F5F5;
      --primary-text: #212121;
      --secondary-text: #9E9E9E;
      --accent-1: #E53935;
      --accent-2: #C62828;
      --border: rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--bg-soft); 
      color: var(--primary-text); 
      padding: 40px;
    }

    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 60px;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .logo span { color: var(--accent-1); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      margin-bottom: 60px;
    }

    .stat-card {
      background: white;
      padding: 40px;
      border-radius: 32px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 40px rgba(0,0,0,0.02);
    }

    .stat-label {
      font-size: 12px;
      font-weight: 800;
      color: var(--secondary-text);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
      display: block;
    }

    .stat-value {
      font-size: 48px;
      font-weight: 800;
      color: var(--primary-text);
    }

    .user-list {
      background: white;
      padding: 40px;
      border-radius: 32px;
      border: 1px solid var(--border);
    }

    .user-list h3 {
      margin-bottom: 30px;
      font-size: 24px;
      font-weight: 800;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 15px;
      border-bottom: 2px solid var(--bg-soft);
      font-size: 13px;
      color: var(--secondary-text);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    td {
      padding: 20px 15px;
      border-bottom: 1px solid var(--bg-soft);
      font-size: 15px;
    }

    .btn-reset {
      padding: 10px 20px;
      background: var(--bg-soft);
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      color: var(--accent-1);
      font-size: 12px;
    }

    .btn-reset:hover { background: #fee; }
  </style>
</head>

<body>

  <div class="admin-container">
    <div class="header">
      <div class="logo">KEI<span>N</span>EN</span> ADMIN</div>
      <a href="index.html" style="text-decoration:none; font-weight:700; color:var(--primary-text);">← Back to Site</a>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-label">Total Page Views</span>
        <div class="stat-value" id="total-visitors">0</div>
      </div>
      <div class="stat-card">
        <span class="stat-label">Unique Visitors</span>
        <div class="stat-value" id="unique-visitors">0</div>
      </div>
      <div class="stat-card">
        <span class="stat-label">Registered Users</span>
        <div class="stat-value" id="total-users">0</div>
      </div>
    </div>

    <div class="user-list">
      <h3>Registered Users</h3>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="user-table-body">
          <!-- Users will be loaded here -->
        </tbody>
      </table>
      
      <div style="margin-top: 40px; text-align: right;">
        <button class="btn-reset" onclick="resetStats()">Reset Visitor Stats</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
        loadStats();
        loadUsers();
    });

    function loadStats() {
        document.getElementById('total-visitors').innerText = localStorage.getItem('keinen_total_visitors') || '0';
        document.getElementById('unique-visitors').innerText = localStorage.getItem('keinen_unique_visitors') || '0';
    }

    function loadUsers() {
        const users = JSON.parse(localStorage.getItem('keinen_users') || '[]');
        document.getElementById('total-users').innerText = users.length;

        const tbody = document.getElementById('user-table-body');
        tbody.innerHTML = '';

        users.forEach((user, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${user.name}</td>
                <td>${user.email}</td>
                <td><button class="btn-reset" style="color:#666;" onclick="deleteUser(${index})">Delete</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function deleteUser(index) {
        const users = JSON.parse(localStorage.getItem('keinen_users') || '[]');
        users.splice(index, 1);
        localStorage.setItem('keinen_users', JSON.stringify(users));
        loadUsers();
    }

    function resetStats() {
        if(confirm('Reset all visitor statistics?')) {
            localStorage.setItem('keinen_total_visitors', '0');
            localStorage.setItem('keinen_unique_visitors', '0');
            localStorage.removeItem('keinen_is_unique');
            loadStats();
        }
    }
  </script>
</body>
</html>
